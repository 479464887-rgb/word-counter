<!DOCTYPE html>
<html lang="en">

<head>
<meta property="og:title" content="Word Counter — DevKit">
<meta property="og:description" content="Free online Word Counter tool — fast, simple, and no signup required.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://479464887-rgb.github.io/word-counter/">
<meta name="twitter:card" content="summary">
<link rel="canonical" href="https://479464887-rgb.github.io/word-counter/">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠</text></svg>">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Word Counter — DevKit Tools</title>
  <meta name="description" content="在线Words统计工具 - 中英文Words/Characters/段落数/Lines统计">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #58a6ff
    }

    .logo span {
      color: #f0c040
    }

    header .badge {
      font-size: 10px;
      background: #daa520;
      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px
    }

    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 32px 24px;
      flex: 1
    }

    .tool-wrapper {
      padding: 20px 0
    }

    footer {
      padding: 16px 24px;
      border-top: 1px solid #21262d;
      text-align: center;
      font-size: 12px;
      color: #484f58
    }

    footer a {
      color: #58a6ff;
      text-decoration: none;
      margin: 0 8px
    }

    .btn-primary:hover {
      background: #2ea043 !important
    }

    .btn:hover {
      background: #30363d !important
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #58a6ff !important
    }

    .btn {
      font-family: inherit
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">🛠 <span>Dev</span>Kit<span class="badge">BETA</span></div>
    <div style="font-size:11px;color:#8b949e">🔒 Processed locally · 数据不Upload</div>
  </header>
  <main>
    <h1 style="font-size:24px;margin-bottom:4px">Word Counter</h1>
    <p style="color:#8b949e;font-size:14px;margin-bottom:8px">在线Words统计工具 - 中英文Words/Characters/段落数/Lines统计</p>
    <div class="tool-wrapper"><textarea id="wc-input" placeholder="Input或粘贴文字..." rows="8" style="width:100%;padding:16px;font-size:14px;border:1px solid #30363d;border-radius:8px;background:#0d1117;color:#c9d1d9;resize:vertical;outline:none;font-family:mono;line-height:1.6;min-height:250px"></textarea>
      <div id="wc-stats" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:16px">
        <div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;text-align:center">
          <div style="font-size:28px;font-weight:700;color:#58a6ff">0</div>
          <div style="font-size:11px;color:#8b949e;margin-top:4px">Characters</div>
        </div>
        <div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;text-align:center">
          <div style="font-size:28px;font-weight:700;color:#58a6ff">0</div>
          <div style="font-size:11px;color:#8b949e;margin-top:4px">字符(无空格)</div>
        </div>
        <div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;text-align:center">
          <div style="font-size:28px;font-weight:700;color:#3fb950">0</div>
          <div style="font-size:11px;color:#8b949e;margin-top:4px">英文单词</div>
        </div>
        <div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;text-align:center">
          <div style="font-size:28px;font-weight:700;color:#f0c040">0</div>
          <div style="font-size:11px;color:#8b949e;margin-top:4px">中文Words</div>
        </div>
        <div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;text-align:center">
          <div style="font-size:28px;font-weight:700;color:#bc8cff">0</div>
          <div style="font-size:11px;color:#8b949e;margin-top:4px">Lines</div>
        </div>
        <div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;text-align:center">
          <div style="font-size:28px;font-weight:700;color:#f85149">0</div>
          <div style="font-size:11px;color:#8b949e;margin-top:4px">段落数</div>
        </div>
      </div>
      <div style="margin-top:16px;padding:12px 16px;background:#161b22;border:1px solid #30363d;border-radius:8px;font-size:12px;color:#8b949e;display:flex;gap:24px"><span>预估阅读: <strong id="wc-read" style="color:#c9d1d9">0</strong> 分钟</span><span>预估朗读: <strong id="wc-speak" style="color:#c9d1d9">0</strong> 分钟</span></div>
    </div>
  </main>
  <footer><a href="https://github.com/479464887-rgb/word-counter">GitHub</a><span>·</span><span>© 2026 DevKit</span></footer>
  <script>
    function count() {
      const t = document.getElementById('wc-input').value;
      const chars = t.length;
      const charsNoSpace = t.replace(/\s/g, '').length;
      const enWords = (t.match(/[a-zA-Z]+/g) || []).length;
      const cnChars = (t.match(/[\u4e00-\u9fff]/g) || []).length;
      const lines = t.split('\n').length;
      const paras = t.split('\n\n').filter(p => p.trim()).length;
      const vals = [chars, charsNoSpace, enWords, cnChars, lines, paras || 1];
      document.querySelectorAll('#wc-stats .\!font-size-28px').forEach((el, i) => {
        if (i < vals.length) el.textContent = vals[i]
      });
      const totalWords = enWords + cnChars;
      document.getElementById('wc-read').textContent = Math.max(1, Math.ceil(totalWords / 300));
      document.getElementById('wc-speak').textContent = Math.max(1, Math.ceil(totalWords / 200))
    }
    document.getElementById('wc-input').addEventListener('input', () => {
      clearTimeout(window._wc);
      window._wc = setTimeout(count, 100)
    })
  </script>
</body>

</html>
